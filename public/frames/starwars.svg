<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Stars background -->
    <pattern id="spacestars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#050510" />
      <circle cx="10" cy="10" r="1" fill="#FFF" />
      <circle cx="50" cy="80" r="1.5" fill="#FFF" opacity="0.6" />
      <circle cx="90" cy="30" r="1.2" fill="#FFF" opacity="0.8" />
    </pattern>
    <filter id="neonGlowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="neonGlowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Borders -->
  <rect x="0" y="0" width="1920" height="100" fill="url(#spacestars)" stroke="#333" stroke-width="4"/>
  <rect x="0" y="980" width="1920" height="100" fill="url(#spacestars)" stroke="#333" stroke-width="4"/>
  <rect x="0" y="0" width="60" height="1080" fill="url(#spacestars)" stroke="#333" stroke-width="4"/>
  <rect x="1860" y="0" width="60" height="1080" fill="url(#spacestars)" stroke="#333" stroke-width="4"/>

  <!-- Left Lightsaber (Blue) -->
  <rect x="30" y="100" width="10" height="880" fill="#FFF" filter="url(#neonGlowBlue)" stroke="#00FFFF" stroke-width="4"/>
  
  <!-- Right Lightsaber (Red) -->
  <rect x="1880" y="100" width="10" height="880" fill="#FFF" filter="url(#neonGlowRed)" stroke="#FF0000" stroke-width="4"/>

  <!-- Text -->
  <text x="960" y="1050" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="50" fill="#FFE81F" text-anchor="middle" letter-spacing="10">JEDI IN TRAINING</text>
</svg>
