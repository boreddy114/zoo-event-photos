<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Sparkling Star pattern for the border -->
    <pattern id="stars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="#FFD700" opacity="0.8"/>
      <circle cx="20" cy="20" r="5" fill="#FFF" opacity="0.5"/>
      <circle cx="80" cy="80" r="3" fill="#FFF" opacity="0.6"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Clear center, decorative borders -->
  <!-- Top Border -->
  <rect x="0" y="0" width="1920" height="120" fill="#E62429" />
  <rect x="0" y="0" width="1920" height="120" fill="url(#stars)" />
  
  <!-- Bottom Border -->
  <rect x="0" y="960" width="1920" height="120" fill="#E62429" />
  <rect x="0" y="960" width="1920" height="120" fill="url(#stars)" />

  <!-- Left Border -->
  <rect x="0" y="0" width="40" height="1080" fill="#E62429" />
  
  <!-- Right Border -->
  <rect x="1880" y="0" width="40" height="1080" fill="#E62429" />

  <!-- The classic Mickey Mouse Ears at Top Left -->
  <g transform="translate(150, 100)" filter="url(#glow)">
    <circle cx="-60" cy="-60" r="45" fill="#111" />
    <circle cx="60" cy="-60" r="45" fill="#111" />
    <circle cx="0" cy="0" r="70" fill="#111" />
  </g>

  <!-- Magical Text -->
  <text x="960" y="1035" font-family="Arial, sans-serif" font-weight="bold" font-size="60" font-style="italic" fill="#FFF" text-anchor="middle" filter="url(#glow)">MAKING MAGICAL MEMORIES</text>

  <!-- Some extra magic wands or sparkles -->
  <path d="M1750 90 L1700 130" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1700" cy="130" r="15" fill="#FFF" filter="url(#glow)"/>
</svg>
