<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Underwater Bubbles pattern -->
    <pattern id="bubbles" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="50" r="10" fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>
      <circle cx="80" cy="120" r="25" fill="none" stroke="#FFF" stroke-width="3" opacity="0.4"/>
      <circle cx="150" cy="30" r="15" fill="none" stroke="#FFF" stroke-width="2" opacity="0.5"/>
      <circle cx="180" cy="180" r="8" fill="none" stroke="#FFF" stroke-width="2" opacity="0.7"/>
    </pattern>
    <filter id="waterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Clear center, decorative borders -->
  <!-- Top and Bottom Borders with wavy lines -->
  <rect x="0" y="0" width="1920" height="150" fill="#00A2D3" opacity="0.9"/>
  <rect x="0" y="0" width="1920" height="150" fill="url(#bubbles)" />
  
  <rect x="0" y="930" width="1920" height="150" fill="#00A2D3" opacity="0.9"/>
  <rect x="0" y="930" width="1920" height="150" fill="url(#bubbles)" />

  <rect x="0" y="0" width="60" height="1080" fill="#00A2D3" opacity="0.8"/>
  <rect x="1860" y="0" width="60" height="1080" fill="#00A2D3" opacity="0.8"/>

  <!-- Nemo-like Fish SVG -->
  <g transform="translate(200, 100) scale(1.5)">
    <path d="M0,0 Q30,-20 60,0 Q90,20 60,40 Q30,60 0,40 Z" fill="#FF7F00"/>
    <path d="M60,0 L90,-10 L80,20 Z" fill="#FF7F00"/>
    <path d="M60,40 L90,50 L80,20 Z" fill="#FF7F00"/>
    <path d="M20,0 L30,-15 L40,0 Z" fill="#FF7F00"/>
    <!-- Stripes -->
    <path d="M20,0 Q25,20 20,40" stroke="#FFF" stroke-width="6" fill="none"/>
    <path d="M45,10 Q50,20 45,30" stroke="#FFF" stroke-width="4" fill="none"/>
    <circle cx="15" cy="15" r="3" fill="#000"/>
  </g>

  <!-- Text -->
  <text x="960" y="1030" font-family="Arial, sans-serif" font-weight="900" font-size="70" fill="#FF7F00" stroke="#FFF" stroke-width="3" text-anchor="middle" filter="url(#waterGlow)">OCEAN EXPLORER</text>
</svg>
